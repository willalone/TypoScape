<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TypoScape — интерактивная 3D-типографика. Объёмное слово TYPO в тёмном пространстве."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TypoScape — Interactive 3D Typography" />
    <meta
      property="og:description"
      content="Интерактивная 3D-типографика на Vue 3 и Three.js"
    />
    <meta
      property="og:image"
      content="https://willalone.github.io/TypoScape/docs/preview.svg"
    />
    <meta property="og:url" content="https://willalone.github.io/TypoScape/" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>TypoScape — Interactive 3D Typography</title>
    <style>
      .boot {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        margin: 0;
        background: #020408;
        color: #f2ece3;
        font-family: Georgia, 'Times New Roman', serif;
      }
      .boot__inner {
        text-align: center;
        padding: 2rem;
      }
      .boot__preview {
        width: min(22rem, 80vw);
        margin: 0 auto 1.25rem;
        opacity: 0.9;
      }
      .boot__title {
        margin: 0 0 0.35rem;
        font-size: 1.5rem;
        letter-spacing: 0.08em;
        color: #ffb050;
      }
      .boot__status {
        margin: 0;
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        color: rgba(255, 208, 128, 0.55);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot" role="status" aria-live="polite">
        <div class="boot__inner">
          <img
            class="boot__preview"
            src="docs/preview.svg"
            width="360"
            height="200"
            alt="TypoScape — интерактивная 3D-типографика TYPO"
          />
          <p class="boot__title">TypoScape</p>
          <p class="boot__status">Загрузка 3D-сцены…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
